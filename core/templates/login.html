{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Excelsior Aviation GSE</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      background: #FFFFFF;
      background-image: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,107,0,0.12) 0%, transparent 60%);
    }
    .login-wrap { width: 100%; max-width: 420px; }
    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-brand img { width: 80px; margin-bottom: 0.9rem; filter: drop-shadow(0 4px 10px rgba(255,107,0,0.3)); }
    .login-brand h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem; font-weight: 900; letter-spacing: 5px; color: #FF6B00;
      text-shadow: 0 0 20px rgba(255,107,0,0.25);
    }
    .login-brand h1 span { color: #FF4500; }
    .login-brand p { color: #BB7744; font-size: 0.78rem; margin-top: 0.35rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .login-card {
      background: #FFFFFF;
      border: 1.5px solid rgba(255,107,0,0.25);
      border-top: 3px solid #FF6B00;
      border-radius: 14px;
      padding: 2.25rem 2rem;
      box-shadow: 0 4px 30px rgba(255,107,0,0.12), 0 2px 8px rgba(0,0,0,0.04);
    }
    .alert-error {
      background: rgba(255,107,0,0.07); color: #CC3300; border: 1px solid rgba(255,107,0,0.3);
      border-radius: 8px; padding: 0.7rem 1rem;
      font-size: 0.85rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.45rem; margin-bottom: 1.25rem;
    }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px; color: #AA6633; margin-bottom: 0.45rem;
    }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: #FF6B00; font-size: 1rem; }
    .input-wrap input {
      width: 100%; padding: 0.75rem 0.85rem 0.75rem 2.6rem;
      border: 1.5px solid #FFD4B3; border-radius: 8px;
      font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; color: #1A0A00; font-weight: 600;
      min-height: 48px; background: #FFFAF7;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input:focus {
      outline: none; border-color: #FF6B00;
      box-shadow: 0 0 0 3px rgba(255,107,0,0.15);
      background: #FFFFFF;
    }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #FF4500, #FF6B00, #FF8C00);
      color: #FFFFFF; border: none; border-radius: 9px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1rem;
      padding: 0.85rem; cursor: pointer; min-height: 50px;
      display: flex; align-items: center; justify-content: center; gap: 0.45rem;
      transition: all 0.2s; margin-top: 1.5rem;
      letter-spacing: 2px; text-transform: uppercase;
      box-shadow: 0 4px 18px rgba(255,107,0,0.40);
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #CC3300, #FF4500, #FF6B00);
      box-shadow: 0 6px 26px rgba(255,107,0,0.55);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0); }
    .footer-text { text-align: center; color: #CCAA88; font-size: 0.78rem; margin-top: 1.75rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <img src="{% static 'img/logo.png' %}" alt="Excelsior Aviation" onerror="this.style.display='none'"/>
      <h1>EXCELSIOR <span></span></h1>
      <p>Aviation GSE CORPORATION</p>
    </div>
    <div class="login-card">
      {% if messages %}
        {% for message in messages %}
        <div class="alert-error"><i class="bi bi-exclamation-circle"></i> {{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <i class="bi bi-person"></i>
            <input type="text" id="username" name="username" placeholder="Enter username" required autofocus/>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" id="password" name="password" placeholder="Enter password" required/>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>
    </div>
    <p class="footer-text">Excelsior Aviation Services &copy; 2025</p>
  </div>
</body>
</html>
